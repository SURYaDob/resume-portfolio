# =============================================
# Production Profile — Overrides for deployment
# =============================================

# Server
server.port=${PORT:8080}

# H2 Database — still in-memory for free-tier simplicity
# Swap to PostgreSQL/MySQL later if needed
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.h2.console.enabled=false

# JPA
spring.jpa.show-sql=false

# CORS — restrict to portfolio domain in production
# Comma-separated origins from env var, falls back to GitHub Pages
portfolio.cors.allowed-origins=${CORS_ORIGINS:https://SURYaDob.github.io}
