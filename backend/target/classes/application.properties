# =============================================
# Suraj Dobale - Portfolio Backend Configuration
# =============================================

# Server
server.port=8080

# H2 Database (in-memory for development)
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =============================================
# Mail / SMTP Configuration
# Uses environment variables for security.
# Set SMTP_USERNAME and SMTP_PASSWORD before running.
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:surajdobale29@gmail.com}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Notification email: where contact form submissions get sent
portfolio.email.recipient=${SMTP_USERNAME:surajdobale29@gmail.com}
portfolio.email.sender=${SMTP_USERNAME:surajdobale29@gmail.com}
