# Render Blueprint — deploy the portfolio backend with one click
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: suraj-portfolio-api
    runtime: docker
    repo: https://github.com/SURYaDob/resume-porfolio
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ORIGINS
        value: https://SURYaDob.github.io
      - key: SMTP_PASSWORD
        sync: false  # Set this manually in the Render dashboard
      - key: SMTP_USERNAME
        value: surajdobale29@gmail.com
    healthCheckPath: /api/health
